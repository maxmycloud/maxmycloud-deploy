<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow-primary" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284C7"/>
    </marker>
    <marker id="arrow-secondary" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#7DA9C5"/>
    </marker>
    <style>
      .zone-tab-text { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; fill: #FFFFFF; }
      .box-title { font-size: 13px; font-weight: 600; fill: #0F172A; }
      .box-sub { font-size: 11px; fill: #64748B; }
      .box-sub-mono { font-size: 10.5px; fill: #64748B; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      .arrow-label { font-size: 10.5px; font-weight: 600; fill: #0284C7; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
      .arrow-label-bg { fill: #FFFFFF; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="980" height="640" fill="#FFFFFF"/>

  <!-- ═══ Users (top center) ═══ -->
  <rect x="380" y="20" width="220" height="52" rx="8" fill="#FFFFFF" stroke="#0F172A" stroke-width="1.5"/>
  <text x="490" y="44" text-anchor="middle" class="box-title">Your users</text>
  <text x="490" y="60" text-anchor="middle" class="box-sub">browser sessions</text>

  <!-- ═══════════════════════════════════════════════════════════════════════
       YOUR AWS ACCOUNT
       ═══════════════════════════════════════════════════════════════════════ -->
  <rect x="30" y="115" width="460" height="505" rx="12" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Zone tab -->
  <rect x="30" y="102" width="180" height="26" rx="6" fill="#0F172A"/>
  <text x="120" y="120" text-anchor="middle" class="zone-tab-text">YOUR AWS ACCOUNT</text>

  <!-- ALB -->
  <rect x="110" y="150" width="300" height="52" rx="6" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.75"/>
  <text x="260" y="172" text-anchor="middle" class="box-title">Application Load Balancer</text>
  <text x="260" y="190" text-anchor="middle" class="box-sub">HTTPS · your ACM cert</text>

  <!-- ECS -->
  <rect x="60" y="230" width="400" height="94" rx="6" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.75"/>
  <text x="260" y="256" text-anchor="middle" class="box-title">ECS Fargate — Nuxt Web UI</text>
  <text x="260" y="276" text-anchor="middle" class="box-sub">container image pulled from your ECR</text>
  <text x="260" y="294" text-anchor="middle" class="box-sub">reads secrets + connection strings from Secrets Manager at boot</text>
  <text x="260" y="314" text-anchor="middle" class="box-sub">the workload that queries your Snowflake account</text>

  <!-- Data-tier row -->
  <rect x="60" y="352" width="120" height="68" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.25"/>
  <text x="120" y="376" text-anchor="middle" class="box-title">DocumentDB</text>
  <text x="120" y="393" text-anchor="middle" class="box-sub">app state</text>
  <text x="120" y="408" text-anchor="middle" class="box-sub">encrypted</text>

  <rect x="200" y="352" width="120" height="68" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.25"/>
  <text x="260" y="376" text-anchor="middle" class="box-title">EFS</text>
  <text x="260" y="393" text-anchor="middle" class="box-sub">shared snapshots</text>
  <text x="260" y="408" text-anchor="middle" class="box-sub">across tasks</text>

  <rect x="340" y="352" width="120" height="68" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.25"/>
  <text x="400" y="376" text-anchor="middle" class="box-title">Secrets Manager</text>
  <text x="400" y="393" text-anchor="middle" class="box-sub">JWT · MFA</text>
  <text x="400" y="408" text-anchor="middle" class="box-sub">DB URI · keys</text>

  <!-- Optional / auxiliary row -->
  <rect x="60" y="445" width="192" height="60" rx="6" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.25" stroke-dasharray="4 3"/>
  <text x="156" y="468" text-anchor="middle" class="box-title">Amazon Bedrock</text>
  <text x="156" y="486" text-anchor="middle" class="box-sub">optional LLM inference</text>
  <text x="156" y="500" text-anchor="middle" class="box-sub">off by default</text>

  <rect x="268" y="445" width="192" height="60" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.25"/>
  <text x="364" y="468" text-anchor="middle" class="box-title">Amazon SES</text>
  <text x="364" y="486" text-anchor="middle" class="box-sub">outbound email</text>
  <text x="364" y="500" text-anchor="middle" class="box-sub">reports · notifications</text>

  <!-- CloudWatch strip -->
  <rect x="60" y="530" width="400" height="46" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.25"/>
  <text x="260" y="552" text-anchor="middle" class="box-title">CloudWatch</text>
  <text x="260" y="568" text-anchor="middle" class="box-sub">application logs · metrics · audit trail</text>

  <!-- ═══════════════════════════════════════════════════════════════════════
       YOUR SNOWFLAKE ACCOUNT(S)
       ═══════════════════════════════════════════════════════════════════════ -->
  <rect x="530" y="115" width="420" height="505" rx="12" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="530" y="102" width="240" height="26" rx="6" fill="#0F172A"/>
  <text x="650" y="120" text-anchor="middle" class="zone-tab-text">YOUR SNOWFLAKE ACCOUNT(S)</text>

  <!-- OAuth Security Integration (top — SSO entry point) -->
  <rect x="560" y="150" width="360" height="94" rx="6" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.75"/>
  <text x="740" y="176" text-anchor="middle" class="box-title">OAuth Security Integration</text>
  <text x="740" y="195" text-anchor="middle" class="box-sub">customer-created, per Snowflake account</text>
  <text x="740" y="212" text-anchor="middle" class="box-sub">handles end-user SSO login to the UI</text>
  <text x="740" y="230" text-anchor="middle" class="box-sub-mono">https://&lt;your-fqdn&gt;/api/oauth/callback</text>

  <!-- MaxMyCloud Native App (below, larger, more descriptive) -->
  <rect x="560" y="272" width="360" height="304" rx="6" fill="#E0F2FE" stroke="#0284C7" stroke-width="1.75"/>
  <text x="740" y="300" text-anchor="middle" class="box-title">MaxMyCloud Native App</text>
  <text x="740" y="320" text-anchor="middle" class="box-sub">"Monitor Center"</text>
  <text x="740" y="336" text-anchor="middle" class="box-sub">installed via Snowflake Marketplace private listing</text>
  <line x1="590" y1="356" x2="890" y2="356" stroke="#0284C7" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="740" y="382" text-anchor="middle" class="box-sub">• collects query + warehouse usage</text>
  <text x="740" y="404" text-anchor="middle" class="box-sub">• executes autosize actions</text>
  <text x="740" y="426" text-anchor="middle" class="box-sub">• runs scheduled tasks in-account</text>
  <text x="740" y="448" text-anchor="middle" class="box-sub">• API integration for outbound calls</text>
  <line x1="590" y1="472" x2="890" y2="472" stroke="#0284C7" stroke-width="0.5" stroke-dasharray="2 2"/>
  <text x="740" y="503" text-anchor="middle" class="box-sub">gated by the maxmycloud_role application role</text>
  <text x="740" y="540" text-anchor="middle" class="box-sub">no customer data leaves your Snowflake tenant</text>

  <!-- ═══════════════════════════════════════════════════════════════════════
       ARROWS
       ═══════════════════════════════════════════════════════════════════════ -->

  <!-- Users → ALB (short, angled down-left, enters ALB from top) -->
  <path d="M 450 72 C 400 100, 320 130, 260 148" fill="none" stroke="#0284C7" stroke-width="1.75" marker-end="url(#arrow-primary)"/>
  <rect x="303" y="93" width="70" height="16" rx="3" class="arrow-label-bg"/>
  <text x="338" y="105" text-anchor="middle" class="arrow-label">HTTPS 443</text>

  <!-- Users → OAuth (short, angled down-right, enters OAuth from top) -->
  <path d="M 530 72 C 580 100, 660 130, 740 148" fill="none" stroke="#0284C7" stroke-width="1.75" marker-end="url(#arrow-primary)"/>
  <rect x="597" y="93" width="70" height="16" rx="3" class="arrow-label-bg"/>
  <text x="632" y="105" text-anchor="middle" class="arrow-label">SSO login</text>

  <!-- ALB → ECS -->
  <path d="M 260 202 L 260 230" fill="none" stroke="#0284C7" stroke-width="1.75" marker-end="url(#arrow-primary)"/>

  <!-- ECS ↔ Native App: main data channel between zones -->
  <!-- HTTPS queries out -->
  <path d="M 460 265 L 555 320" fill="none" stroke="#0284C7" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="470" y="278" width="88" height="16" rx="3" class="arrow-label-bg"/>
  <text x="514" y="290" text-anchor="middle" class="arrow-label">HTTPS queries</text>
  <!-- API integration back -->
  <path d="M 555 350 L 460 300" fill="none" stroke="#0284C7" stroke-width="2" marker-end="url(#arrow-primary)"/>
  <rect x="472" y="323" width="92" height="16" rx="3" class="arrow-label-bg"/>
  <text x="518" y="335" text-anchor="middle" class="arrow-label">API integration</text>

  <!-- ECS → data tier (three thin arrows down) -->
  <path d="M 120 324 L 120 350" fill="none" stroke="#7DA9C5" stroke-width="1.25" marker-end="url(#arrow-secondary)"/>
  <path d="M 260 324 L 260 350" fill="none" stroke="#7DA9C5" stroke-width="1.25" marker-end="url(#arrow-secondary)"/>
  <path d="M 400 324 L 400 350" fill="none" stroke="#7DA9C5" stroke-width="1.25" marker-end="url(#arrow-secondary)"/>

  <!-- Data tier → aux row (Bedrock dashed = optional, SES solid) -->
  <path d="M 156 420 L 156 443" fill="none" stroke="#94A3B8" stroke-width="1.25" stroke-dasharray="4 3" marker-end="url(#arrow-secondary)"/>
  <path d="M 364 420 L 364 443" fill="none" stroke="#7DA9C5" stroke-width="1.25" marker-end="url(#arrow-secondary)"/>

  <!-- Aux → CloudWatch -->
  <path d="M 260 505 L 260 528" fill="none" stroke="#7DA9C5" stroke-width="1.25" marker-end="url(#arrow-secondary)"/>
</svg>
